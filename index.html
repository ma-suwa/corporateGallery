<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corporate Gallery — コーポレートサイト参照集</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --text: #1d1d1f;
      --subtext: #86868b;
      --accent: #0071e3;
      --bg: #ffffff;
      --gray: #f5f5f7;
      --gray-dark: #e8e8ed;
      --border: #d2d2d7;
      --green: #34c759;
      --orange: #ff9500;
      --font: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", "Helvetica", "Arial", sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 56px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .logo span {
      color: var(--subtext);
      font-weight: 400;
      font-size: 13px;
      margin-left: 8px;
    }

    /* ── Search ── */
    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--subtext);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 8px 14px 8px 38px;
      font-size: 15px;
      font-family: var(--font);
      border: none;
      background: var(--gray);
      border-radius: 10px;
      color: var(--text);
      outline: none;
      transition: background 0.2s;
    }

    .search-input:focus {
      background: var(--gray-dark);
    }

    .search-input::placeholder {
      color: var(--subtext);
    }

    /* ── Main ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 32px 80px;
    }

    /* ── Filters ── */
    .filters {
      background: var(--gray);
      border-radius: 18px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .filter-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
      padding-top: 7px;
      min-width: 56px;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      padding: 5px 14px;
      font-size: 13px;
      font-family: var(--font);
      border: 1.5px solid transparent;
      border-radius: 20px;
      cursor: pointer;
      background: var(--bg);
      color: var(--text);
      transition: all 0.18s ease;
      white-space: nowrap;
      line-height: 1.4;
      font-weight: 400;
    }

    .pill:hover {
      background: var(--gray-dark);
    }

    .pill.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .pill.disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
    }

    .pill.coming-soon::after {
      content: " (近日)";
      font-size: 10px;
      opacity: 0.7;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 16px;
    }

    .stats {
      font-size: 13px;
      color: var(--subtext);
    }

    .stats strong {
      color: var(--text);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--subtext);
    }

    .legend-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background: var(--gray);
      padding: 3px;
      border-radius: 10px;
    }

    .view-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 14px;
      font-size: 13px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      color: var(--subtext);
      font-family: var(--font);
      transition: all 0.18s;
      white-space: nowrap;
    }

    .view-btn.active {
      background: var(--bg);
      color: var(--text);
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    /* ── List View ── */
    .table-wrap {
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      overflow-x: auto;
    }

    table.list-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .list-table thead {
      background: var(--gray);
    }

    .list-table thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--subtext);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    .list-table thead th:hover {
      color: var(--text);
    }

    .list-table tbody tr {
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      transition: background 0.12s;
    }

    .list-table tbody tr:last-child {
      border-bottom: none;
    }

    .list-table tbody tr:hover {
      background: var(--gray);
    }

    .list-table td {
      padding: 11px 16px;
      vertical-align: middle;
    }

    .td-industry {
      font-size: 11px;
      color: var(--subtext);
      white-space: nowrap;
    }

    .td-company {
      font-weight: 500;
      white-space: nowrap;
      color: var(--text);
    }

    .td-page {}

    .page-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: var(--gray-dark);
      color: var(--text);
      white-space: nowrap;
    }

    .td-url {
      min-width: 240px;
      max-width: 400px;
    }

    .url-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      word-break: break-all;
    }

    .url-link:hover {
      text-decoration: underline;
    }

    .url-na {
      color: var(--subtext);
      font-size: 12px;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: 5px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .dot-green {
      background: var(--green);
    }

    .dot-orange {
      background: var(--orange);
    }

    /* ── Matrix View ── */
    .matrix-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    table.matrix-table {
      border-collapse: collapse;
      font-size: 12px;
      min-width: 100%;
    }

    .matrix-table th,
    .matrix-table td {
      border: 1px solid var(--border);
    }

    .matrix-table thead th {
      background: var(--gray);
      padding: 6px;
      font-size: 10px;
      font-weight: 600;
      color: var(--subtext);
      text-align: center;
      white-space: nowrap;
      min-width: 72px;
    }

    .matrix-table thead th.col-company {
      min-width: 160px;
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
    }

    .matrix-table tbody th {
      background: var(--gray);
      padding: 10px 14px;
      font-weight: 500;
      white-space: nowrap;
      text-align: left;
      font-size: 13px;
      color: var(--text);
      position: sticky;
      left: 0;
      z-index: 2;
    }

    .matrix-table td.matrix-cell {
      text-align: center;
      padding: 6px;
      background: var(--bg);
      transition: background 0.1s;
    }

    .matrix-table td.matrix-cell:hover {
      background: #eef5fd;
    }

    .matrix-table td.matrix-cell a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-decoration: none;
      font-size: 15px;
    }

    .matrix-table td.matrix-na {
      background: var(--gray);
      color: var(--border);
      text-align: center;
      font-size: 11px;
    }

    /* ── No Results ── */
    .no-results {
      text-align: center;
      padding: 80px 32px;
      color: var(--subtext);
    }

    .no-results h3 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    /* ── Hidden ── */
    .hidden {
      display: none !important;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      main {
        padding: 20px 16px 60px;
      }

      .header-inner {
        padding: 0 16px;
      }

      .logo span {
        display: none;
      }

      .search-wrap {
        max-width: none;
      }

      .filter-label {
        min-width: 44px;
      }

      .legend {
        display: none;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="header-inner">
      <div class="logo">Corporate Gallery<span>コーポレートサイト参照集</span></div>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="#86868b" stroke-width="1.5" />
          <path d="M10.5 10.5L14 14" stroke="#86868b" stroke-width="1.5" stroke-linecap="round" />
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="企業名・ページ種別・URLで検索…"
          oninput="applyFilters()">
      </div>
    </div>
  </header>

  <main>

    <!-- Filters -->
    <div class="filters">
      <!-- Industry -->
      <div class="filter-row">
        <div class="filter-label">業界</div>
        <div class="pills" id="pillsIndustry">
          <!-- populated by buildIndustryPills() on init -->
        </div>
      </div>
      <!-- Page Type -->
      <div class="filter-row">
        <div class="filter-label">ページ</div>
        <div class="pills" id="pillsPage">
          <button class="pill active" data-value="all" onclick="setFilter('pageType','all',this)">すべて</button>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="stats" id="statsBar">読み込み中…</div>
      <div class="toolbar-right">
        <div class="legend">
          <span><span class="legend-dot" style="background:var(--green)"></span>確認済み</span>
          <span><span class="legend-dot" style="background:var(--orange)"></span>要確認</span>
          <span><span class="legend-dot" style="background:var(--border)"></span>N/A</span>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="btnList" onclick="setView('list',this)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <rect y="0" width="14" height="2" rx="1" />
              <rect y="5" width="14" height="2" rx="1" />
              <rect y="10" width="14" height="2" rx="1" />
            </svg>
            リスト
          </button>
          <button class="view-btn" id="btnMatrix" onclick="setView('matrix',this)">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
              <rect x="0" y="0" width="6" height="6" rx="1" />
              <rect x="8" y="0" width="6" height="6" rx="1" />
              <rect x="0" y="8" width="6" height="6" rx="1" />
              <rect x="8" y="8" width="6" height="6" rx="1" />
            </svg>
            マトリクス
          </button>
        </div>
      </div>
    </div>

    <!-- List View -->
    <div id="viewList">
      <div class="table-wrap">
        <table class="list-table">
          <thead>
            <tr>
              <th onclick="sortBy('industry')">業界</th>
              <th onclick="sortBy('company')">企業名</th>
              <th onclick="sortBy('pageType')">ページ種別</th>
              <th>URL</th>
              <th style="width:60px; text-align:center;">状態</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div id="noResultsList" class="no-results hidden">
        <h3>該当なし</h3>
        <p>検索条件を変更してみてください。</p>
      </div>
    </div>

    <!-- Matrix View -->
    <div id="viewMatrix" class="hidden">
      <div class="matrix-wrap" id="matrixWrap"></div>
      <div id="noResultsMatrix" class="no-results hidden">
        <h3>該当なし</h3>
        <p>検索条件を変更してみてください。</p>
      </div>
    </div>

  </main>

    /* ============================================================
       PROCESS
    ============================================================ */
    const allData = RAW.map(([iid, cid, pt, url, verified]) => ({
      industryId: iid,
      industry:   INDUSTRIES[iid],
      companyId:  cid,
      company:    COMPANIES[cid],
      pageType:   pt,
      url,
      verified
    }));

    /* ============================================================
       STATE
    ============================================================ */
    let state = { industry: 'all', pageType: 'all' };
    let currentView = 'list';
    let sortKey = null, sortAsc = true;

    /* ============================================================
       PILL HELPERS
    ============================================================ */
    function mkPill(axis, value, label, active) {
      return `<button class="pill${active ? ' active' : ''}" data-value="${value}" onclick="setFilter('${axis}','${value}')">${label}</button>`;
    }

    let _industryPillsBuilt = false;
    function buildDynamicPills() {
      // Build industry pills once from INDUSTRIES object
      if (!_industryPillsBuilt) {
        const el = document.getElementById('pillsIndustry');
        el.innerHTML = mkPill('industry', 'all', 'すべて', state.industry === 'all') +
          Object.entries(INDUSTRIES)
            .map(([id, label]) => mkPill('industry', id, label, state.industry === id))
            .join('');
        _industryPillsBuilt = true;
      } else {
        document.querySelectorAll('#pillsIndustry .pill').forEach(p => {
          p.classList.toggle('active', p.dataset.value === state.industry);
        });
      }

      // Page type pills — only types present in the selected industry
      const availPt = new Set(
        allData
          .filter(d => state.industry === 'all' || d.industryId === state.industry)
          .map(d => d.pageType)
      );
      document.getElementById('pillsPage').innerHTML =
        mkPill('pageType', 'all', 'すべて', state.pageType === 'all') +
        PAGE_TYPES
          .filter(pt => availPt.has(pt))
          .map(pt => mkPill('pageType', pt, pt, state.pageType === pt))
          .join('');
    }

    /* ============================================================
       BOOT
    ============================================================ */
    function init() {
      buildDynamicPills();
      applyFilters();
    }

    /* ============================================================
       FILTER
    ============================================================ */
    function setFilter(axis, value) {
      state[axis] = (state[axis] === value && value !== 'all') ? 'all' : value;
      if (axis === 'industry') { state.pageType = 'all'; }
      buildDynamicPills();
      applyFilters();
    }

    function getFiltered() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      return allData.filter(d => {
        if (state.industry !== 'all' && d.industryId !== state.industry) return false;
        if (state.pageType !== 'all' && d.pageType   !== state.pageType) return false;
        if (q && !`${d.industry} ${d.company} ${d.pageType} ${d.url ?? ''}`.toLowerCase().includes(q)) return false;
        return true;
      });
    }

    function applyFilters() {
      const filtered = getFiltered();
      updateStats(filtered);
      currentView === 'list' ? renderList(filtered) : renderMatrix(filtered);
    }

    /* ============================================================
       STATS
    ============================================================ */
    function updateStats(filtered) {
      const cos     = new Set(filtered.map(d => d.companyId)).size;
      const inds    = new Set(filtered.map(d => d.industryId)).size;
      const withUrl = filtered.filter(d => d.url).length;
      const na      = filtered.filter(d => !d.url).length;
      document.getElementById('statsBar').innerHTML =
        `<strong>${withUrl}</strong> URL / <strong>${cos}</strong>社 / <strong>${inds}</strong>業界` +
        (na > 0 ? ` <span style="color:var(--subtext)">（N/A: ${na}件含む）</span>` : '');
    }

    /* ============================================================
       LIST VIEW
    ============================================================ */
    function sortBy(key) {
      sortAsc = sortKey === key ? !sortAsc : true;
      sortKey = key;
      applyFilters();
    }

    function renderList(data) {
      const sorted = sortKey
        ? [...data].sort((a, b) => {
            const cmp = (a[sortKey] ?? '').localeCompare(b[sortKey] ?? '', 'ja');
            return sortAsc ? cmp : -cmp;
          })
        : data;

      const tbody = document.getElementById('tableBody');
      const noRes = document.getElementById('noResultsList');

      if (!sorted.length) {
        tbody.innerHTML = '';
        noRes.classList.remove('hidden');
        return;
      }
      noRes.classList.add('hidden');

      tbody.innerHTML = sorted.map(d => {
        const [dot, urlCell] = d.url === null
          ? [
              `<span class="dot" style="background:var(--border)" title="N/A"></span>`,
              `<span class="url-na">—</span>`
            ]
          : [
              `<span class="dot ${d.verified ? 'dot-green' : 'dot-orange'}" title="${d.verified ? '確認済み' : '要確認'}"></span>`,
              `<a class="url-link" href="${d.url}" target="_blank" rel="noopener noreferrer">${d.url}</a>`
            ];
        return `<tr>
      <td class="td-industry">${d.industry}</td>
      <td class="td-company">${d.company}</td>
      <td class="td-page"><span class="page-badge">${d.pageType}</span></td>
      <td class="td-url">${urlCell}</td>
      <td style="text-align:center;">${dot}</td>
    </tr>`;
      }).join('');
    }

    /* ============================================================
       MATRIX VIEW
    ============================================================ */
    function renderMatrix(data) {
      const wrap = document.getElementById('matrixWrap');
      const noRes = document.getElementById('noResultsMatrix');
      const companyIds = [...new Set(data.map(d => d.companyId))];
      const pageTypes  = [...new Set(data.map(d => d.pageType))];

      if (!companyIds.length) {
        wrap.innerHTML = '';
        noRes.classList.remove('hidden');
        return;
      }
      noRes.classList.add('hidden');

      const lk = {};
      data.forEach(d => { (lk[d.companyId] ??= {})[d.pageType] = d; });

      function cell(entry) {
        if (!entry || entry.url === null)
          return `<td class="matrix-na">${entry ? '—' : ''}</td>`;
        return `<td class="matrix-cell"><a href="${entry.url}" target="_blank" rel="noopener noreferrer" title="${entry.url}">${entry.verified ? '🟢' : '🟡'}</a></td>`;
      }

      wrap.innerHTML = `<table class="matrix-table">
        <thead><tr>
          <th class="col-company">企業名</th>
          ${pageTypes.map(pt => `<th title="${pt}">${pt}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${companyIds.map(cid =>
            `<tr><th>${COMPANIES[cid]}</th>${pageTypes.map(pt => cell(lk[cid]?.[pt])).join('')}</tr>`
          ).join('')}
        </tbody>
      </table>`;
    }

    /* ============================================================
       VIEW TOGGLE
    ============================================================ */
    function setView(view, btn) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('viewList').classList.toggle('hidden', view !== 'list');
      document.getElementById('viewMatrix').classList.toggle('hidden', view !== 'matrix');
      applyFilters();
    }

    /* ============================================================
       BOOT
    ============================================================ */
    init();
  </script>

</body>

</html>
